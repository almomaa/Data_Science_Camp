<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fireflies in Sync</title>
<style>
  /* ---- The night-sky look ---- */
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #05060a; }
  body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; color: #f3e9d2; }
  canvas { display: block; position: fixed; inset: 0; }

  /* ---- Title ---- */
  #title { position: fixed; top: 14px; left: 0; right: 0; text-align: center;
           pointer-events: none; z-index: 3; }
  #title h1 { margin: 0; font-size: 22px; font-weight: 600; letter-spacing: .3px;
              color: #ffd98a; text-shadow: 0 0 18px rgba(255,190,90,.5); }
  #title p  { margin: 4px 0 0; font-size: 13px; color: #b9b09a; }

  /* ---- Control panel ---- */
  #panel { position: fixed; top: 70px; left: 16px; z-index: 3; width: 250px;
           padding: 16px 18px; border-radius: 14px;
           background: rgba(16,18,26,.72); backdrop-filter: blur(8px);
           border: 1px solid rgba(255,210,130,.18); }
  .row { margin: 0 0 13px; }
  .row:last-child { margin-bottom: 0; }
  label { display: flex; justify-content: space-between; font-size: 12.5px;
          color: #cfc6b0; margin-bottom: 5px; }
  label b { color: #ffd98a; font-weight: 600; }
  input[type=range] { width: 100%; accent-color: #ffbe5a; cursor: pointer; }
  .btns { display: flex; gap: 8px; }
  button { flex: 1; padding: 8px 0; font-size: 13px; color: #1a140a; cursor: pointer;
           background: #ffbe5a; border: none; border-radius: 9px; font-weight: 600; }
  button.ghost { background: transparent; color: #ffd98a;
                 border: 1px solid rgba(255,210,130,.4); }
  button:hover { filter: brightness(1.08); }
  .check { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: #cfc6b0; }
  .check input { accent-color: #ffbe5a; width: 16px; height: 16px; }

  /* ---- Sync meter + caption ---- */
  #meterWrap { position: fixed; bottom: 26px; left: 0; right: 0; text-align: center; z-index: 3; }
  #bar { width: min(420px, 70vw); height: 10px; margin: 0 auto;
         background: rgba(255,255,255,.08); border-radius: 6px; overflow: hidden; }
  #fill { height: 100%; width: 0%; border-radius: 6px;
          background: linear-gradient(90deg,#ff9a3c,#ffd98a); transition: width .1s linear; }
  #pct { font-size: 26px; font-weight: 700; color: #ffd98a; margin-top: 8px;
         text-shadow: 0 0 16px rgba(255,190,90,.5); }
  #caption { font-size: 14px; color: #b9b09a; margin-top: 2px; }
</style>
</head>
<body>

<div id="title">
  <h1>Fireflies in Sync</h1>
  <p>No leader tells them when to flash — each just nudges toward its neighbors, and unison appears on its own.</p>
</div>

<div id="panel">
  <div class="row">
    <label>Fireflies <b id="nOut">200</b></label>
    <input type="range" id="nSlide" min="30" max="500" step="10" value="200">
  </div>
  <div class="row">
    <label>Coupling (togetherness) <b id="kOut">1.5</b></label>
    <input type="range" id="kSlide" min="0" max="4" step="0.05" value="1.5">
  </div>
  <div class="row">
    <label>Flash speed <b id="sOut">0.90</b> Hz</label>
    <input type="range" id="sSlide" min="0.2" max="2" step="0.05" value="0.9">
  </div>
  <div class="row">
    <label>Variety of rhythms <b id="vOut">0.15</b></label>
    <input type="range" id="vSlide" min="0" max="0.4" step="0.01" value="0.15">
  </div>
  <div class="row check">
    <input type="checkbox" id="localChk">
    <span>See neighbors only</span>
  </div>
  <div class="row" id="radRow" style="display:none">
    <label>Neighbor range <b id="rOutv">0.18</b></label>
    <input type="range" id="rSlide" min="0.05" max="0.5" step="0.01" value="0.18">
  </div>
  <div class="row btns">
    <button id="scramble">Scramble</button>
    <button id="pause" class="ghost">Pause</button>
  </div>
</div>

<div id="meterWrap">
  <div id="bar"><div id="fill"></div></div>
  <div id="pct">0%</div>
  <div id="caption">everyone marching alone</div>
</div>

<canvas id="sky"></canvas>

<script>
// ============================================================
//  FIREFLY SYNCHRONIZATION
//  Each firefly is an oscillator: a phase (angle) that keeps
//  advancing. It flashes when its phase comes around. Coupling
//  gently pulls each firefly toward the others' rhythm, so the
//  whole field drifts into unison. (This is the Kuramoto model.)
// ============================================================

const canvas = document.getElementById('sky');
const ctx = canvas.getContext('2d');
let W, H, dpr;

// ---- A reusable "glow" sprite so drawing is fast and pretty ----
const glow = document.createElement('canvas');
glow.width = glow.height = 64;
const gctx = glow.getContext('2d');
const grad = gctx.createRadialGradient(32, 32, 0, 32, 32, 32);
grad.addColorStop(0.0, 'rgba(255,240,200,1)');
grad.addColorStop(0.25, 'rgba(255,200,90,0.9)');
grad.addColorStop(0.6, 'rgba(255,150,40,0.25)');
grad.addColorStop(1.0, 'rgba(255,140,0,0)');
gctx.fillStyle = grad;
gctx.fillRect(0, 0, 64, 64);

// ---- Faint background stars (drawn once per resize) ----
let stars = [];
function makeStars() {
  stars = [];
  for (let i = 0; i < 90; i++) {
    stars.push({ x: Math.random(), y: Math.random(), a: 0.15 + 0.35 * Math.random() });
  }
}

// ---- The fireflies ----
let flies = [];
function makeFlies(n) {
  const variety = +vSlide.value;
  flies = [];
  for (let i = 0; i < n; i++) {
    flies.push({
      x: Math.random(), y: Math.random(),          // position (0..1)
      theta: Math.random() * 2 * Math.PI,          // its phase (the timer)
      nat: 1 + variety * (Math.random() * 2 - 1)   // its own natural rhythm
    });
  }
}

// ---- Controls ----
const nSlide = id('nSlide'), kSlide = id('kSlide'), sSlide = id('sSlide'),
      vSlide = id('vSlide'), rSlide = id('rSlide'), localChk = id('localChk');
let paused = false;

nSlide.oninput = () => { id('nOut').textContent = nSlide.value; makeFlies(+nSlide.value); };
kSlide.oninput = () => id('kOut').textContent = (+kSlide.value).toFixed(2);
sSlide.oninput = () => { id('sOut').textContent = (+sSlide.value).toFixed(2); refreshNat(); };
vSlide.oninput = () => { id('vOut').textContent = (+vSlide.value).toFixed(2); refreshNat(); };
rSlide.oninput = () => id('rOutv').textContent = (+rSlide.value).toFixed(2);
localChk.onchange = () => id('radRow').style.display = localChk.checked ? '' : 'none';
id('scramble').onclick = () => flies.forEach(f => f.theta = Math.random() * 2 * Math.PI);
id('pause').onclick = () => { paused = !paused; id('pause').textContent = paused ? 'Play' : 'Pause'; };
canvas.onclick = e => flies.push({ x: e.clientX / window.innerWidth, y: e.clientY / window.innerHeight,
                                   theta: Math.random() * 2 * Math.PI, nat: 1 + (+vSlide.value) * (Math.random() * 2 - 1) });

function refreshNat() {                 // re-roll natural rhythms when variety changes
  const variety = +vSlide.value;
  flies.forEach(f => f.nat = 1 + variety * (Math.random() * 2 - 1));
}

// ---- Fit the canvas to the window ----
function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  makeStars();
}
window.addEventListener('resize', resize);

// ---- The main loop ----
let last = performance.now();
function frame(now) {
  let dt = Math.min(0.05, (now - last) / 1000);   // seconds since last frame
  last = now;
  if (!paused) step(dt);
  draw();
  requestAnimationFrame(frame);
}

function step(dt) {
  const K = +kSlide.value, speed = +sSlide.value, N = flies.length;

  // Group order parameter (overall sync level and average phase)
  let sS = 0, sC = 0;
  for (const f of flies) { sS += Math.sin(f.theta); sC += Math.cos(f.theta); }
  const r = Math.sqrt(sS * sS + sC * sC) / N;
  const psi = Math.atan2(sS, sC);

  if (localChk.checked) {
    // Each firefly only feels neighbors within a radius
    const rad = +rSlide.value, rad2 = rad * rad;
    const upd = new Array(N);
    for (let i = 0; i < N; i++) {
      const fi = flies[i];
      let lS = 0, lC = 0, cnt = 0;
      for (let j = 0; j < N; j++) {
        const fj = flies[j];
        const dx = fi.x - fj.x, dy = fi.y - fj.y;
        if (dx * dx + dy * dy < rad2) { lS += Math.sin(fj.theta); lC += Math.cos(fj.theta); cnt++; }
      }
      const lr = cnt ? Math.sqrt(lS * lS + lC * lC) / cnt : 0;
      const lpsi = Math.atan2(lS, lC);
      upd[i] = 2 * Math.PI * speed * fi.nat + K * lr * Math.sin(lpsi - fi.theta);
    }
    for (let i = 0; i < N; i++) flies[i].theta += dt * upd[i];
  } else {
    // Each firefly feels the whole group (the simple, reliable rule)
    for (const f of flies)
      f.theta += dt * (2 * Math.PI * speed * f.nat + K * r * Math.sin(psi - f.theta));
  }

  // Update the sync meter + caption
  const pct = Math.round(r * 100);
  id('fill').style.width = pct + '%';
  id('pct').textContent = pct + '%';
  id('caption').textContent =
    pct < 30 ? 'everyone marching alone' :
    pct < 75 ? 'starting to agree…' : 'flashing as one!';
  lastR = r; lastPsi = psi;
}
let lastR = 0, lastPsi = 0;

function draw() {
  // Night sky
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = '#05060a';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  for (const s of stars) { ctx.globalAlpha = s.a; ctx.fillRect(s.x * W, s.y * H, 1.4, 1.4); }
  ctx.globalAlpha = 1;

  // A soft page-wide pulse when the group flashes together
  const groupFlash = Math.exp(3 * (Math.cos(lastPsi) - 1)) * lastR;
  if (groupFlash > 0.02) {
    const g = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.7);
    g.addColorStop(0, 'rgba(255,190,90,' + (0.16 * groupFlash).toFixed(3) + ')');
    g.addColorStop(1, 'rgba(255,190,90,0)');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  }

  // The fireflies, glowing (additive light so overlaps blend)
  ctx.globalCompositeOperation = 'lighter';
  for (const f of flies) {
    const b = Math.exp(3 * (Math.cos(f.theta) - 1));   // 1 at the flash, ~0 between
    const size = 8 + 40 * b;
    ctx.globalAlpha = 0.18 + 0.82 * b;
    ctx.drawImage(glow, f.x * W - size / 2, f.y * H - size / 2, size, size);
  }
  ctx.globalAlpha = 1;
}

// helper
function id(x) { return document.getElementById(x); }

// ---- Go! ----
resize();
makeFlies(+nSlide.value);
requestAnimationFrame(frame);
</script>
</body>
</html>
